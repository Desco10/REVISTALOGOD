<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{NOMBRE}}</title>

<meta name="description" content="{{DESCRIPCION}}">

<!-- OpenGraph (WhatsApp / Facebook preview) -->
<meta property="og:title" content="{{NOMBRE}}">
<meta property="og:description" content="{{DESCRIPCION}}">
<meta property="og:image" content="https://revistalogo.netlify.app{{IMAGEN}}">
<meta property="og:type" content="product">
<meta property="og:url" content="https://revistalogo.netlify.app/tienda/producto/{{SLUG}}.html">

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/producto.css">

</head>

<body>

<div class="producto-page">

<img class="producto-img" src="{{IMAGEN}}" alt="{{NOMBRE}}">

<h1 class="producto-titulo">{{NOMBRE}}</h1>

<p class="producto-desc">
{{DESCRIPCION}}
</p>

<div class="producto-precio">
$ {{PRECIO}}
</div>

<div class="producto-botones">

<a class="btn btn-whatsapp"
href="https://wa.me/57246030396?text=Hola quiero comprar {{NOMBRE}} https://revistalogo.netlify.app/tienda/producto/{{SLUG}}.html"
target="_blank">
Comprar por WhatsApp
</a>

<a href="javascript:history.back()" class="btn btn-volver">
← Volver al catálogo
</a>

</div>

</div>

</body>
</html>
